<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Link Hub</title>
    <style>
        /* 1. Global Styles */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            /* Sky Blue */
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            min-height: 100dvh;
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        /* 2. Profile Section */
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            margin-bottom: 15px;
            object-fit: cover;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .bio {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* 3. The Links (Bento Grid Style) */
        .links-grid {
            display: grid;
            gap: 15px;
        }

        .link-card {
            background: var(--card-bg);
            padding: 18px;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, border 0.2s;
            border: 1px solid transparent;
        }

        /* Hover Effect for Desktop / Active for Mobile */
        .link-card:active,
        .link-card:hover {
            transform: scale(0.98);
            border-color: var(--accent);
            background: #243347;
        }

        /* 4. Special "Tip" Button */
        .highlight {
            background: linear-gradient(45deg, #38bdf8, #818cf8);
            color: white;
        }

        /* 5. Footer */
        footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .myLink {
            color: var(--text-dim);
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">
        <img src="./profile.png" alt="Profile" class="profile-img">

        <h1>@Username</h1>
        <p class="bio">Content Creator | Football Enthusiast | Tech</p>

        <div class="links-grid">
            <a href="#" class="link-card">Latest YouTube Video 📺</a>
            <a href="#" class="link-card">Follow on TikTok 🎵</a>
            <a href="#" class="link-card">Join My Telegram 🚀</a>

            <a href="#" class="link-card highlight">Support My Work (Tip) 💸</a>
        </div>

        <footer>
            Built by <a class="myLink" href="#">One-nne</a>
        </footer>
    </div>
</body>

</html>
